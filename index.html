<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌕 HD Solar System – Moons & Satellites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            background: #05080f;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 14px;
            align-items: center;
            pointer-events: none;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }
        #ui>* {
            pointer-events: auto;
        }

        #info {
            color: rgba(255, 255, 255, 0.35);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.8px;
            background: rgba(0, 0, 0, 0.45);
            padding: 6px 18px;
            border-radius: 20px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            user-select: none;
            white-space: nowrap;
        }

        .btn {
            background: rgba(30, 80, 180, 0.5);
            border: 1px solid rgba(100, 180, 255, 0.2);
            color: #fff;
            padding: 6px 20px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.4px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: all 0.3s ease;
            user-select: none;
            font-family: inherit;
            pointer-events: auto;
        }
        .btn:hover {
            background: rgba(50, 130, 255, 0.6);
            border-color: rgba(120, 200, 255, 0.4);
            transform: scale(1.04);
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn .icon {
            margin-right: 6px;
        }

        #time-display {
            position: absolute;
            top: 20px;
            right: 24px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.35);
            padding: 4px 14px;
            border-radius: 16px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            font-variant-numeric: tabular-nums;
            z-index: 10;
        }

        #planet-label {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            background: rgba(0, 0, 0, 0.2);
            padding: 3px 16px;
            border-radius: 12px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: opacity 0.8s ease;
            z-index: 10;
        }

        @media (max-width: 600px) {
            #info {
                font-size: 11px;
                padding: 4px 12px;
                white-space: normal;
            }
            #time-display {
                font-size: 11px;
                padding: 3px 10px;
                top: 14px;
                right: 14px;
            }
            .btn {
                font-size: 11px;
                padding: 4px 14px;
            }
            #ui {
                bottom: 16px;
                gap: 8px;
            }
            #planet-label {
                bottom: 68px;
                font-size: 10px;
                padding: 2px 12px;
            }
        }
    </style>
</head>
<body>

    <div id="time-display">--:-- UTC</div>
    <div id="planet-label">✦ Solar System</div>

    <div id="ui">
        <div id="info">🔄 Drag · ⚡ Scroll · 🎯 Click Earth</div>
        <button class="btn" id="earth-btn"><span class="icon">🌍</span> Earth</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ----- IMPORTS -----
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ----- CONFIG -----
        const EARTH_RADIUS = 4.0;
        const SUN_RADIUS = 8.0;

        const ORBITS = {
            mercury: 14,
            venus: 20,
            earth: 28,
            mars: 36,
            jupiter: 52,
            saturn: 72,
            uranus: 90,
            neptune: 110,
        };

        const PLANET_SIZES = {
            mercury: 1.0,
            venus: 2.8,
            earth: EARTH_RADIUS,
            mars: 2.0,
            jupiter: 7.5,
            saturn: 6.2,
            uranus: 3.4,
            neptune: 3.2,
        };

        const ORBIT_SPEED_BASE = 0.00035;

        // ----- SCENE -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05080f);

        // ----- LIGHTS -----
        const ambient = new THREE.AmbientLight(0x446688, 0.6);
        scene.add(ambient);

        const hemi = new THREE.HemisphereLight(0x6699ff, 0x223366, 0.5);
        scene.add(hemi);

        const sunLight = new THREE.PointLight(0xffeedd, 2.2, 0, 2);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // ----- CAMERA -----
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1200);
        camera.position.set(35, 18, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.prepend(renderer.domElement);

        // ----- CONTROLS -----
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.rotateSpeed = 0.4;
        controls.zoomSpeed = 0.7;
        controls.minDistance = 4;
        controls.maxDistance = 400;
        controls.target.set(0, 0, 0);
        controls.update();

        // ----- STARS (HD) -----
        function createStars() {
            const count = 30000;
            const pos = new Float32Array(count * 3);
            const col = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const r = 120 + Math.random() * 400;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.cos(phi);
                pos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                const b = 0.3 + Math.random() * 0.7;
                const t = Math.random();
                if (t < 0.05) { col[i * 3] = b * 0.5;
                    col[i * 3 + 1] = b * 0.4;
                    col[i * 3 + 2] = b * 1.0; } else if (t < 0.10) { col[i * 3] = b * 1.0;
                    col[i * 3 + 1] = b * 0.7;
                    col[i * 3 + 2] = b * 0.4; } else if (t < 0.15) { col[i * 3] = b * 0.9;
                    col[i * 3 + 1] = b * 0.9;
                    col[i * 3 + 2] = b * 1.0; } else { col[i * 3] = b;
                    col[i * 3 + 1] = b;
                    col[i * 3 + 2] = b; }
            }
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geom.setAttribute('color', new THREE.BufferAttribute(col, 3));
            const mat = new THREE.PointsMaterial({
                size: 0.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const stars = new THREE.Points(geom, mat);
            scene.add(stars);
            return stars;
        }
        createStars();

        // ----- SUN WITH FIRE SHADER -----
        function createSun() {
            const vShader = `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vec4 wp = modelMatrix * vec4(position, 1.0);
                        vPosition = wp.xyz;
                        gl_Position = projectionMatrix * viewMatrix * wp;
                    }
                `;
            const fShader = `
                    uniform float time;
                    uniform vec3 c1,c2,c3,c4;
                    uniform float intensity;
                    varying vec3 vNormal;
                    varying vec3 vPosition;

                    float hash(vec3 p) {
                        p = fract(p * 0.3183099 + 0.1);
                        p *= 17.0;
                        return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
                    }
                    float noise(vec3 p) {
                        vec3 i = floor(p), f = fract(p);
                        f = f * f * (3.0 - 2.0 * f);
                        return mix(
                            mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                                mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                            mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                                mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),
                            f.z
                        );
                    }
                    float fbm(vec3 p) {
                        float v=0., a=0.5, f=1.0;
                        for(int i=0;i<5;i++){ v+=a*noise(p*f); f*=2.1; a*=0.48; }
                        return v;
                    }
                    void main() {
                        vec3 viewDir = normalize(cameraPosition - vPosition);
                        vec3 n = normalize(vNormal);
                        vec3 p = vPosition * 0.5;
                        float t = time * 0.12;
                        float n1 = fbm(p + vec3(t*0.3,t*0.2,t*0.1));
                        float n2 = fbm(p*0.7 + vec3(t*0.5,t*0.3,t*0.7));
                        float n3 = fbm(p*1.3 + vec3(t*0.7,t*0.5,t*0.3));
                        float fire = n1*0.55 + n2*0.3 + n3*0.15;
                        float rim = 1.0 - abs(dot(n, viewDir));
                        rim = smoothstep(0.0,0.8,rim);
                        fire = fire * (0.4 + 0.6*rim);
                        vec3 col;
                        if(fire>0.75) col = mix(c1,c2,(fire-0.75)/0.25);
                        else if(fire>0.5) col = mix(c2,c3,(fire-0.5)/0.25);
                        else col = mix(c4,c3,fire/0.5);
                        col *= 1.2 + 0.3*fire;
                        float glow = pow(1.0-abs(dot(n,viewDir)),3.0)*0.12;
                        col += vec3(1.0,0.6,0.2)*glow;
                        col *= 1.0 + 0.03*sin(time*0.8 + fire*6.0);
                        col *= intensity;
                        gl_FragColor = vec4(col,1.0);
                    }
                `;
            const uniforms = {
                time: { value: 0 },
                c1: { value: new THREE.Color(0xfff8ee) },
                c2: { value: new THREE.Color(0xffdd44) },
                c3: { value: new THREE.Color(0xff8800) },
                c4: { value: new THREE.Color(0xcc2200) },
                intensity: { value: 1.3 },
            };
            const mat = new THREE.ShaderMaterial({
                uniforms,
                vertexShader: vShader,
                fragmentShader: fShader,
                side: THREE.FrontSide,
            });
            const geo = new THREE.SphereGeometry(SUN_RADIUS, 128, 128);
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);

            // Glow
            const makeGlow = (color, scale, opacity) => {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
                const c = new THREE.Color(color);
                grad.addColorStop(0, `rgba(${c.r*255|0},${c.g*255|0},${c.b*255|0},${opacity})`);
                grad.addColorStop(0.1, `rgba(${c.r*255|0},${c.g*255|0},${c.b*255|0},${opacity*0.7})`);
                grad.addColorStop(0.4, `rgba(${c.r*255|0},${c.g*255|0},${c.b*255|0},${opacity*0.3})`);
                grad.addColorStop(0.7, `rgba(${c.r*255|0},${c.g*255|0},${c.b*255|0},${opacity*0.08})`);
                grad.addColorStop(1, 'rgba(255,200,100,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 512, 512);
                const tex = new THREE.CanvasTexture(canvas);
                const mat2 = new THREE.SpriteMaterial({
                    map: tex,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    transparent: true,
                });
                const sprite = new THREE.Sprite(mat2);
                sprite.scale.set(scale, scale, 1);
                scene.add(sprite);
                return sprite;
            };
            const g1 = makeGlow(0xffdd88, 60, 0.8);
            const g2 = makeGlow(0xff8800, 30, 0.5);
            const g3 = makeGlow(0xff4400, 90, 0.25);

            return { mesh, uniforms, glows: [g1, g2, g3] };
        }
        const sunObj = createSun();

        // ----- TEXTURE GENERATOR -----
        function createPlanetTexture(baseColor, options = {}) {
            const {
                bands = false,
                    bandColors = [],
                    spots = false,
                    spotCount = 0,
                    swirls = false,
                    swirlCount = 0,
                    craters = false,
                    craterCount = 0,
                    noise = false,
                    noiseAmount = 0,
                    dust = false,
                    dustCount = 0,
                    clouds = false,
                    cloudCount = 0,
                    ice = false,
                    iceCount = 0,
            } = options;
            const W = 4096,
                H = 2048;
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');
            const c = new THREE.Color(baseColor);
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            const c1 = new THREE.Color(baseColor).multiplyScalar(0.8);
            const c2 = new THREE.Color(baseColor).multiplyScalar(1.2);
            grad.addColorStop(0, `rgb(${c1.r*255|0},${c1.g*255|0},${c1.b*255|0})`);
            grad.addColorStop(0.5, `rgb(${c.r*255|0},${c.g*255|0},${c.b*255|0})`);
            grad.addColorStop(1, `rgb(${c2.r*255|0},${c2.g*255|0},${c2.b*255|0})`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            if (bands && bandColors.length) {
                for (let i = 0; i < 40; i++) {
                    const y = Math.random() * H;
                    const h = 8 + Math.random() * 70;
                    const col = new THREE.Color(bandColors[Math.floor(Math.random() * bandColors.length)]);
                    const a = 0.15 + Math.random() * 0.5;
                    ctx.fillStyle = `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},${a})`;
                    ctx.fillRect(0, y, W, h);
                }
                for (let i = 0; i < 200; i++) {
                    const y = Math.random() * H,
                        x = Math.random() * W;
                    const w = 30 + Math.random() * 200,
                        h = 2 + Math.random() * 35;
                    const col = new THREE.Color(bandColors[Math.floor(Math.random() * bandColors.length)]);
                    ctx.fillStyle = `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},${0.06+Math.random()*0.3})`;
                    ctx.fillRect(x, y, w, h);
                }
            }
            if (spots) {
                for (let i = 0; i < spotCount; i++) {
                    const x = Math.random() * W,
                        y = Math.random() * H,
                        r = 8 + Math.random() * 65;
                    const col = new THREE.Color(baseColor).multiplyScalar(0.35 + Math.random() * 0.5);
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},${0.25+Math.random()*0.5})`;
                    ctx.fill();
                }
            }
            if (swirls) {
                for (let i = 0; i < swirlCount; i++) {
                    const x = Math.random() * W,
                        y = Math.random() * H;
                    const w = 20 + Math.random() * 100,
                        h = 2 + Math.random() * 25,
                        angle = Math.random() * Math.PI * 2;
                    const col = new THREE.Color(baseColor).multiplyScalar(0.5 + Math.random() * 0.6);
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(angle);
                    ctx.fillStyle = `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},${0.04+Math.random()*0.2})`;
                    ctx.fillRect(-w / 2, -h / 2, w, h);
                    ctx.restore();
                }
            }
            if (craters) {
                for (let i = 0; i < craterCount; i++) {
                    const x = Math.random() * W,
                        y = Math.random() * H,
                        r = 2 + Math.random() * 28;
                    const col = new THREE.Color(baseColor).multiplyScalar(0.3 + Math.random() * 0.5);
                    ctx.beginPath();
                    ctx.arc(x + r * 0.15, y + r * 0.15, r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0,0,0,${0.08+Math.random()*0.2})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},${0.25+Math.random()*0.5})`;
                    ctx.fill();
                }
            }
            if (dust) {
                for (let i = 0; i < dustCount; i++) {
                    const x = Math.random() * W,
                        y = Math.random() * H,
                        r = 0.5 + Math.random() * 6;
                    const col = new THREE.Color(baseColor).multiplyScalar(0.6 + Math.random() * 0.6);
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},${0.08+Math.random()*0.25})`;
                    ctx.fill();
                }
            }
            if (clouds) {
                for (let i = 0; i < cloudCount; i++) {
                    const x = Math.random() * W,
                        y = Math.random() * H;
                    const w = 25 + Math.random() * 180,
                        h = 6 + Math.random() * 50;
                    const col = new THREE.Color(baseColor).multiplyScalar(1.1 + Math.random() * 0.3);
                    const a = 0.04 + Math.random() * 0.12;
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(Math.random() * 0.5 - 0.25);
                    const g2 = ctx.createRadialGradient(0, 0, 0, 0, 0, w / 2);
                    g2.addColorStop(0, `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},${a})`);
                    g2.addColorStop(0.6, `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},${a*0.5})`);
                    g2.addColorStop(1, `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},0)`);
                    ctx.fillStyle = g2;
                    ctx.fillRect(-w / 2, -h / 2, w, h);
                    ctx.restore();
                }
            }
            if (ice) {
                for (let i = 0; i < iceCount; i++) {
                    const x = Math.random() * W,
                        y = Math.random() * H,
                        r = 4 + Math.random() * 25;
                    const col = new THREE.Color(0xccddff);
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${col.r*255|0},${col.g*255|0},${col.b*255|0},${0.04+Math.random()*0.12})`;
                    ctx.fill();
                }
            }
            if (noise) {
                const imageData = ctx.getImageData(0, 0, W, H);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const n = (Math.random() - 0.5) * noiseAmount * 255;
                    data[i] = Math.min(255, Math.max(0, data[i] + n));
                    data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + n));
                    data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + n));
                }
                ctx.putImageData(imageData, 0, 0);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.generateMipmaps = true;
            return texture;
        }

        // ----- SATURN RING TEXTURE (with dust) -----
        function createSaturnRingTexture() {
            const W = 4096,
                H = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, W, H);
            const inner = new THREE.Color(0xd4c09a),
                mid = new THREE.Color(0xc8b88a),
                outer = new THREE.Color(0xb8a880);
            for (let i = 0; i < 350; i++) {
                const t = i / 350,
                    x = t * W;
                let color = new THREE.Color().lerpColors(inner, mid, t * 0.7);
                if (t > 0.55) color.lerp(outer, (t - 0.55) / 0.45);
                const warm = Math.sin(t * 12 + 0.5) * 0.04 + 0.96;
                color.multiplyScalar(warm);
                const density = 0.35 + 0.65 * (0.3 * Math.sin(t * 45 + 0.7) + 0.25 * Math.sin(t * 110 + 2.3) +
                    0.2 * Math.sin(t * 28 + 4.1) + 0.15 * Math.sin(t * 200 + 1.5) + 0.1 * Math.sin(t * 320 + 3.7)) *
                    0.5 + 0.5;
                const edge = 1 - Math.pow(Math.abs(t - 0.5) * 2.2, 4) * 0.4;
                let opacity = 0.12 + 0.75 * density * edge;
                let gap = 1;
                if (t > 0.38 && t < 0.52) gap = 0.1 + 0.9 * (1 - Math.abs(t - 0.45) / 0.07);
                const gaps2 = [0.62, 0.70, 0.78, 0.85, 0.92];
                for (const g of gaps2) { if (Math.abs(t - g) < 0.012) gap = Math.min(gap, Math.abs(t - g) / 0.012 * 0.3 +
                    0.1); }
                const ringlet = 0.6 + 0.4 * (0.5 + 0.5 * Math.sin(t * 350 + 0.5));
                const final = opacity * gap * ringlet;
                const r = color.r * 255 | 0,
                    g = color.g * 255 | 0,
                    b = color.b * 255 | 0;
                const alpha = Math.min(0.9, final * 0.85);
                for (let y = 0; y < H; y++) {
                    const yp = y / H,
                        vd = 1 - Math.pow(Math.abs(yp - 0.5) * 2, 2) * 0.7;
                    const va = alpha * vd;
                    ctx.fillStyle = `rgba(${r},${g},${b},${va})`;
                    ctx.fillRect(x, y, 1, 1);
                }
                if (i % 2 === 0 && Math.random() > 0.75) {
                    for (let d = 0; d < 2 + Math.random() * 5; d++) {
                        const dy = Math.random() * H;
                        ctx.fillStyle =
                            `rgba(${100+Math.random()*80|0},${80+Math.random()*60|0},${60+Math.random()*40|0},${0.01+Math.random()*0.06})`;
                        ctx.fillRect(x + (Math.random() - 0.5) * 3, dy, 0.5 + Math.random() * 2, 0.5 + Math.random() *
                            2);
                    }
                }
            }
            for (let i = 0; i < 6000; i++) {
                const x = Math.random() * W,
                    y = Math.random() * H;
                const a = 0.005 + Math.random() * 0.03,
                    b = 80 + Math.random() * 120;
                ctx.fillStyle = `rgba(${b},${b-20|0},${b-40|0},${a})`;
                ctx.fillRect(x, y, 0.5 + Math.random() * 2, 0.5 + Math.random() * 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            tex.wrapS = THREE.ClampToEdgeWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            return tex;
        }

        // ----- SATURN DUST PARTICLES -----
        function createSaturnDust() {
            const count = 12000;
            const pos = new Float32Array(count * 3),
                col = new Float32Array(count * 3);
            const radius = PLANET_SIZES.saturn;
            const inner = radius * 1.1,
                outer = radius * 2.7;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2,
                    r = inner + Math.random() * (outer - inner);
                const h = (Math.random() - 0.5) * radius * 0.55;
                pos[i * 3] = r * Math.cos(angle);
                pos[i * 3 + 1] = h;
                pos[i * 3 + 2] = r * Math.sin(angle);
                const bright = 0.3 + 0.7 * (1 - Math.abs(h) / (radius * 0.3));
                const choice = Math.random();
                let r2, g2, b2;
                if (choice < 0.4) { r2 = 190 + Math.random() * 60;
                    g2 = 160 + Math.random() * 50;
                    b2 = 90 + Math.random() * 40; } else if (choice < 0.7) { const base = 130 + Math.random() * 80;
                    r2 = base + (Math.random() - 0.5) * 30;
                    g2 = base + (Math.random() - 0.5) * 20;
                    b2 = base + (Math.random() - 0.5) * 20; } else { r2 = 170 + Math.random() * 60;
                    g2 = 90 + Math.random() * 50;
                    b2 = 50 + Math.random() * 40; }
                col[i * 3] = (r2 / 255) * bright;
                col[i * 3 + 1] = (g2 / 255) * bright;
                col[i * 3 + 2] = (b2 / 255) * bright;
            }
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geom.setAttribute('color', new THREE.BufferAttribute(col, 3));
            const mat = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            return new THREE.Points(geom, mat);
        }

        // ----- CREATE PLANET -----

        function createOrbitPath(radius, color = 0x334466, opacity = 0.12) {
            const pts = [];
            for (let i = 0; i <= 160; i++) {
                const a = (i / 160) * Math.PI * 2;
                pts.push(new THREE.Vector3(radius * Math.cos(a), 0, radius * Math.sin(a)));
            }
            const geom = new THREE.BufferGeometry().setFromPoints(pts);
            const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity, depthWrite: false });
            const line = new THREE.Line(geom, mat);
            scene.add(line);
            return line;
        }

            const {
                bands = false,
                    bandColors = [],

                    ringInner = 1.2,
                    ringOuter = 2.6,

            const tex = createPlanetTexture(color, {

                craters,
                craterCount,
                noise,
                noiseAmount,
                dust,
                dustCount,
                clouds,
                cloudCount,
                ice,
                iceCount,
            });
            const mat = new THREE.MeshStandardMaterial({
                map: tex,
                roughness,
                metalness,
                emissive: emissive ? new THREE.Color(emissiveColor) : new THREE.Color(0x112233),
                emissiveIntensity: emissive ? emissiveIntensity : 0.05,
            });
            const geom = new THREE.SphereGeometry(radius, 128, 128);
            const mesh = new THREE.Mesh(geom, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            const startAngle = Math.random() * Math.PI * 2;
            mesh.position.x = orbitRadius * Math.cos(startAngle);
            mesh.position.z = orbitRadius * Math.sin(startAngle);
            if (tilt) mesh.rotation.x = tilt;
            scene.add(mesh);

            let ringMesh = null,
                dustParticles = null;
            if (rings) {
                const ringTex = createSaturnRingTexture();
                const ringMat = new THREE.MeshBasicMaterial({
                    map: ringTex,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 1.0,
                    depthWrite: false,
                });
                const ringGeo = new THREE.RingGeometry(radius * ringInner, radius * ringOuter, 512);
                ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.rotation.x = Math.PI / 2 + 0.4;
                ringMesh.position.copy(mesh.position);
                scene.add(ringMesh);
                dustParticles = createSaturnDust();
                dustParticles.position.copy(mesh.position);
                dustParticles.rotation.x = Math.PI / 2 + 0.4;
                scene.add(dustParticles);
            }

            const orbitLine = createOrbitPath(orbitRadius, new THREE.Color(color).multiplyScalar(1.6), 0.1);
            const data = {
                mesh,
                ringMesh,
                dustParticles,
                orbitLine,
                orbitRadius,
                radius,
                angle: startAngle,
                speed: ORBIT_SPEED_BASE * (1 / (orbitRadius * 0.035 + 0.25)),
                name,
                tilt,
                startAngle,
                impacts: [],
                surface: null,
            };
            planets[name] = data;
            planetMeshes.push(mesh);
            orbitLines.push(orbitLine);
            return data;
        }

        // ----- EARTH (with shader for night lights) -----
        let earthMesh = null,
            earthUniforms = null,
            earthPosition = new THREE.Vector3(ORBITS.earth, 0, 0);

        async function createEarth() {
            const canvas = document.createElement('canvas');
            const W = 4096,
                H = 2048;
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');

            try {
                const img = await new Promise((resolve, reject) => {
                    const i = new Image();
                    i.crossOrigin = 'anonymous';
                    i.onload = () => resolve(i);
                    i.onerror = () => reject();
                    i.src = 'https://unpkg.com/three-globe@2.24.8/example/img/earth-blue-marble.jpg';
                });
                ctx.drawImage(img, 0, 0, W, H);
            } catch (_) {
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#1a3a6a');
                grad.addColorStop(0.3, '#2a6a9a');
                grad.addColorStop(0.5, '#4a8a6a');
                grad.addColorStop(0.7, '#3a7a5a');
                grad.addColorStop(1, '#1a4a3a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);
            }

            // Borders
            try {
                const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
                const data = await resp.json();
                ctx.strokeStyle = 'rgba(180,200,230,0.35)';
                ctx.lineWidth = 1.2;

                function project(lng, lat) { return [(lng + 180) / 360 * W, (90 - lat) / 180 * H]; }

                function drawPolygon(coords, close = true) {
                    if (!coords || coords.length < 3) return;
                    const first = project(coords[0][0], coords[0][1]);
                    ctx.beginPath();
                    ctx.moveTo(first[0], first[1]);
                    for (let i = 1; i < coords.length; i++) {
                        const p = project(coords[i][0], coords[i][1]);
                        ctx.lineTo(p[0], p[1]);
                    }
                    if (close) ctx.closePath();
                    ctx.stroke();
                }

                function drawFeature(geom) {
                    if (!geom) return;
                    if (geom.type === 'Polygon') {
                        drawPolygon(geom.coordinates[0], true);
                        for (let i = 1; i < geom.coordinates.length; i++) drawPolygon(geom.coordinates[i], true);
                    } else if (geom.type === 'MultiPolygon') {
                        for (const poly of geom.coordinates) {
                            drawPolygon(poly[0], true);
                            for (let i = 1; i < poly.length; i++) drawPolygon(poly[i], true);
                        }
                    }
                }
                for (const feature of data.features || []) {
                    if (feature.geometry) drawFeature(feature.geometry);
                }
            } catch (_) {}

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.generateMipmaps = true;

            const vShader = `
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vUv = uv;
                        vec4 wp = modelMatrix * vec4(position, 1.0);
                        vPosition = wp.xyz;
                        gl_Position = projectionMatrix * viewMatrix * wp;
                    }
                `;
            const fShader = `
                    uniform sampler2D earthTexture;
                    uniform vec3 sunDirection;
                    uniform vec3 nightColor;
                    uniform vec3 dayColor;
                    uniform vec3 ambientColor;
                    uniform float nightBrightness;
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    void main() {
                        vec4 tex = texture2D(earthTexture, vUv);
                        vec3 n = normalize(vNormal);
                        float sun = dot(n, normalize(sunDirection));
                        float day = smoothstep(-0.1, 0.3, sun);
                        vec3 dCol = tex.rgb * dayColor;
                        vec3 nCol = tex.rgb * nightColor * nightBrightness;
                        nCol += tex.rgb * ambientColor * 0.4;
                        vec3 final = mix(nCol, dCol, day);
                        float rim = 1.0 - abs(sun);
                        float city = smoothstep(0.1, 0.8, rim) * 0.04;
                        final += vec3(0.8,0.7,0.4) * city * nightBrightness;
                        float term = exp(-pow(abs(sun)/0.25,2.0)) * 0.03;
                        final += vec3(0.4,0.6,0.9) * term;
                        gl_FragColor = vec4(final,1.0);
                    }
                `;
            const uniforms = {
                earthTexture: { value: texture },
                sunDirection: { value: new THREE.Vector3(1, 0.3, 0.5).normalize() },
                nightColor: { value: new THREE.Color(0x6688aa) },
                dayColor: { value: new THREE.Color(1, 1, 1) },
                ambientColor: { value: new THREE.Color(0x8899bb) },
                nightBrightness: { value: 1.0 },
            };
            const mat = new THREE.ShaderMaterial({
                uniforms,
                vertexShader: vShader,
                fragmentShader: fShader,
                side: THREE.DoubleSide,
            });
            const geom = new THREE.SphereGeometry(EARTH_RADIUS, 128, 128);
            const mesh = new THREE.Mesh(geom, mat);
            const startAngle = Math.random() * Math.PI * 2;
            mesh.position.x = ORBITS.earth * Math.cos(startAngle);
            mesh.position.z = ORBITS.earth * Math.sin(startAngle);
            scene.add(mesh);
            earthMesh = mesh;
            earthUniforms = uniforms;
            earthPosition.copy(mesh.position);

            const orbitLine = createOrbitPath(ORBITS.earth, 0x4488cc, 0.16);
            planets.earth = {
                mesh,
                orbitLine,
                orbitRadius: ORBITS.earth,
                radius: EARTH_RADIUS,
                angle: startAngle,
                speed: ORBIT_SPEED_BASE * (1 / (ORBITS.earth * 0.035 + 0.25)),
                name: 'earth',
                tilt: 0,
                startAngle,
                isEarth: true,
                impacts: [],
                surface: mesh,
            };
            planetMeshes.push(mesh);

            // Atmosphere
            const aVert = `varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`;
            const aFrag =
                `varying vec3 vN; uniform vec3 color; uniform float intensity; void main(){ float g=pow(0.65-dot(vN,vec3(0,0,1)),2.5); gl_FragColor=vec4(color,g*intensity); }`;
            const aMat = new THREE.ShaderMaterial({
                uniforms: { color: { value: new THREE.Color(0x4488ff) }, intensity: { value: 0.3 } },
                vertexShader: aVert,
                fragmentShader: aFrag,
                side: THREE.FrontSide,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const aMesh = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS * 1.025, 64, 64), aMat);
            aMesh.position.copy(mesh.position);
            scene.add(aMesh);
            planets.earth.atmosphere = aMesh;

            const oMat = new THREE.ShaderMaterial({
                uniforms: { color: { value: new THREE.Color(0x2266cc) }, intensity: { value: 0.15 } },
                vertexShader: aVert,
                fragmentShader: `varying vec3 vN; uniform vec3 color; uniform float intensity; void main(){ float g=pow(0.7-dot(vN,vec3(0,0,1)),3.0); gl_FragColor=vec4(color,g*intensity*0.5); }`,
                side: THREE.FrontSide,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const oMesh = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS * 1.08, 48, 48), oMat);
            oMesh.position.copy(mesh.position);
            scene.add(oMesh);
            planets.earth.outerGlow = oMesh;

            return { mesh, uniforms };
        }

        // ----- ASTEROID SYSTEM (with fiery ones) -----
        const asteroids = [];
        const fireAsteroids = [];
        const rogueAsteroids = [];

        function createAsteroidTexture(flame = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            let r, g, b;
            const colorType = Math.random();
            if (colorType < 0.35) { const base = 25 + Math.random() * 45;
                r = base + (Math.random() - 0.5) * 20;
                g = base + (Math.random() - 0.5) * 15;
                b = base + (Math.random() - 0.5) * 15; } else if (colorType < 0.65) { const base = 55 + Math.random() * 55;
                r = base + (Math.random() - 0.5) * 30;
                g = base + (Math.random() - 0.5) * 25;
                b = base + (Math.random() - 0.5) * 25; } else if (colorType < 0.88) { const base = 95 + Math.random() * 75;
                r = base + (Math.random() - 0.5) * 30;
                g = base + (Math.random() - 0.5) * 20;
                b = base + (Math.random() - 0.5) * 20; } else { r = 170 + Math.random() * 70;
                g = 70 + Math.random() * 50;
                b = 15 + Math.random() * 30; }

            ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
            ctx.fillRect(0, 0, 1024, 1024);

            for (let i = 0; i < 2500; i++) {
                const x = Math.random() * 1024,
                    y = Math.random() * 1024;
                const rad = 0.5 + Math.random() * 4;
                const bright = 0.2 + Math.random() * 0.8;
                const col = (r + g + b) / 3 * bright;
                ctx.beginPath();
                ctx.arc(x, y, rad, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${col|0},${col|0},${col|0},${0.08+Math.random()*0.35})`;
                ctx.fill();
            }
            for (let i = 0; i < 15 + Math.random() * 20; i++) {
                const x = Math.random() * 1024,
                    y = Math.random() * 1024;
                const rad = 3 + Math.random() * 30;
                const bright = 0.12 + Math.random() * 0.35;
                const col = (r + g + b) / 3 * bright;
                ctx.beginPath();
                ctx.arc(x + rad * 0.2, y + rad * 0.15, rad, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,0,0,${0.12+Math.random()*0.2})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, y, rad, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${col|0},${col|0},${col|0},${0.3+Math.random()*0.4})`;
                ctx.fill();
                if (Math.random() > 0.4) {
                    ctx.beginPath();
                    ctx.arc(x - rad * 0.2, y - rad * 0.25, rad * 0.8, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255,255,240,${0.03+Math.random()*0.1})`;
                    ctx.lineWidth = 1 + Math.random() * 2;
                    ctx.stroke();
                }
            }
            if (flame) {
                for (let i = 0; i < 120; i++) {
                    const x = Math.random() * 1024,
                        y = Math.random() * 1024;
                    const rad = 5 + Math.random() * 45;
                    const grad = ctx.createRadialGradient(x, y, 0, x, y, rad);
                    const alpha = 0.02 + Math.random() * 0.08;
                    grad.addColorStop(0, `rgba(255,180,60,${alpha})`);
                    grad.addColorStop(0.5, `rgba(255,120,30,${alpha*0.5})`);
                    grad.addColorStop(1, `rgba(200,60,10,0)`);
                    ctx.fillStyle = grad;
                    ctx.fillRect(x - rad, y - rad, rad * 2, rad * 2);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            return tex;
        }

        function createDetailedAsteroid(size, detailLevel, flame = false) {
            const types = ['icosahedron', 'dodecahedron', 'octahedron', 'box'];
            const type = types[Math.floor(Math.random() * types.length)];
            let geom;
            const s = size;
            const detail = Math.max(2, detailLevel + 1);
            switch (type) {
                case 'icosahedron':
                    geom = new THREE.IcosahedronGeometry(s, detail);
                    break;
                case 'dodecahedron':
                    geom = new THREE.DodecahedronGeometry(s, detail);
                    break;
                case 'octahedron':
                    geom = new THREE.OctahedronGeometry(s, detail);
                    break;
                case 'box':
                default:
                    const w = s * (0.5 + Math.random() * 0.9),
                        h = s * (0.4 + Math.random() * 0.9),
                        d = s * (0.4 + Math.random() * 0.9);
                    geom = new THREE.BoxGeometry(w, h, d, detail, detail, detail);
                    break;
            }
            const pos = geom.attributes.position;
            const v = new THREE.Vector3();
            const strength = 0.3 + Math.random() * 0.6;
            for (let i = 0; i < pos.count; i++) {
                v.fromBufferAttribute(pos, i);
                const len = v.length();
                if (len > 0.001) {
                    const nx = v.x / s,
                        ny = v.y / s,
                        nz = v.z / s;
                    const n1 = Math.sin(nx * 5.3 + ny * 7.1 + nz * 3.7) * 0.3 +
                        Math.cos(nx * 9.7 + ny * 4.3 + nz * 8.1) * 0.2 +
                        Math.sin(nx * 12.1 + ny * 6.7 + nz * 10.3) * 0.15;
                    const n2 = Math.sin(nx * 7.7 + ny * 3.3 + nz * 5.9) * 0.25 +
                        Math.cos(nx * 4.1 + ny * 8.9 + nz * 6.7) * 0.2;
                    const combined = (n1 * 0.6 + n2 * 0.4) * strength * 0.5;
                    v.multiplyScalar(1 + combined);
                    pos.setXYZ(i, v.x, v.y, v.z);
                }
            }
            for (let c = 0; c < 3 + Math.random() * 6; c++) {
                const theta = Math.random() * Math.PI * 2,
                    phi = Math.acos(2 * Math.random() - 1);
                const rad = size * (0.2 + Math.random() * 0.5);
                const cx = rad * Math.sin(phi) * Math.cos(theta),
                    cy = rad * Math.cos(phi),
                    cz = rad * Math.sin(phi) * Math.sin(theta);
                const depth = 0.12 + Math.random() * 0.4,
                    cr = 0.12 + Math.random() * 0.32;
                for (let i = 0; i < pos.count; i++) {
                    v.fromBufferAttribute(pos, i);
                    const dx = v.x - cx,
                        dy = v.y - cy,
                        dz = v.z - cz;
                    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                    const craterR = size * cr;
                    if (dist < craterR) {
                        const infl = 1 - dist / craterR;
                        const push = infl * depth * size * 0.35;
                        const dir = v.clone().normalize();
                        v.sub(dir.multiplyScalar(push));
                        pos.setXYZ(i, v.x, v.y, v.z);
                    }
                }
            }
            geom.computeVertexNormals();
            return geom;
        }

        function buildAsteroidSystem() {
            const total = 1400;
            const textures = [];
            for (let i = 0; i < 20; i++) textures.push(createAsteroidTexture(false));
            const fireTextures = [];
            for (let i = 0; i < 8; i++) fireTextures.push(createAsteroidTexture(true));

            const zones = [
                { inner: 40, outer: 54, count: 500, sizeMin: 0.08, sizeMax: 1.3, height: 2.5 },
                { inner: 56, outer: 74, count: 300, sizeMin: 0.06, sizeMax: 1.1, height: 3.0 },
                { inner: 80, outer: 96, count: 200, sizeMin: 0.05, sizeMax: 0.9, height: 3.5 },
                { inner: 98, outer: 116, count: 150, sizeMin: 0.04, sizeMax: 0.8, height: 4.0 },
            ];

            const fireCount = Math.floor(total * 0.035);

            let idx = 0;
            for (const zone of zones) {
                for (let i = 0; i < zone.count; i++) {
                    let size;
                    const r = Math.random();
                    if (r < 0.5) size = zone.sizeMin + Math.random() * (zone.sizeMax - zone.sizeMin) * 0.3;
                    else if (r < 0.8) size = zone.sizeMin + Math.random() * (zone.sizeMax - zone.sizeMin) * 0.6;
                    else if (r < 0.95) size = zone.sizeMin + Math.random() * (zone.sizeMax - zone.sizeMin) * 0.85;
                    else size = zone.sizeMin + Math.random() * (zone.sizeMax - zone.sizeMin);

                    const radius = zone.inner + Math.random() * (zone.outer - zone.inner);
                    const angle = Math.random() * Math.PI * 2;
                    const inclination = (Math.random() - 0.5) * zone.height;

                    const isFire = idx < fireCount && Math.random() > 0.6;
                    idx++;

                    const detail = 2 + Math.floor(Math.random() * 2);
                    const geom = createDetailedAsteroid(size, detail, isFire);
                    const tex = isFire ? fireTextures[Math.floor(Math.random() * fireTextures.length)] :
                        textures[Math.floor(Math.random() * textures.length)];

                    const mat = new THREE.MeshStandardMaterial({
                        map: tex,
                        roughness: 0.55 + Math.random() * 0.4,
                        metalness: 0.05 + Math.random() * 0.25,
                        emissive: isFire ? new THREE.Color(0xff4400) : new THREE.Color(0x111111),
                        emissiveIntensity: isFire ? 0.6 + Math.random() * 0.5 : 0.02,
                    });

                    const mesh = new THREE.Mesh(geom, mat);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    const x = radius * Math.cos(angle),
                        z = radius * Math.sin(angle);
                    mesh.position.set(x, inclination, z);
                    mesh.rotation.set(Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI *
                    2);
                    scene.add(mesh);

                    const data = {
                        mesh,
                        radius,
                        angle,
                        inclination,
                        speed: (0.00004 + Math.random() * 0.00035) * (1 / (radius * 0.02 + 0.2)),
                        rotSpeed: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.025,
                            (Math.random() - 0.5) * 0.025,
                            (Math.random() - 0.5) * 0.025
                        ),
                        size,
                        isFire,
                        trailPositions: [],
                        alive: true,
                    };
                    asteroids.push(data);
                    if (isFire) fireAsteroids.push(data);
                }
            }

            // Rogue asteroids (on collision courses) - 4 of them
            const targetPlanets = ['mars', 'venus', 'jupiter', 'neptune'];
            for (let i = 0; i < targetPlanets.length; i++) {
                const planetName = targetPlanets[i];
                const planet = planets[planetName];
                if (!planet) continue;
                const pRadius = planet.radius;
                const pOrbit = planet.orbitRadius;

                const spawnRadius = pOrbit + 12 + Math.random() * 18;
                const angle = Math.random() * Math.PI * 2;
                const inc = (Math.random() - 0.5) * 1.5;

                const size = 0.25 + Math.random() * 0.6;
                const geom = createDetailedAsteroid(size, 3, true);
                const tex = createAsteroidTexture(true);
                const mat = new THREE.MeshStandardMaterial({
                    map: tex,
                    roughness: 0.5,
                    metalness: 0.15,
                    emissive: new THREE.Color(0xff5500),
                    emissiveIntensity: 0.8 + Math.random() * 0.6,
                });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                const x = spawnRadius * Math.cos(angle),
                    z = spawnRadius * Math.sin(angle);
                mesh.position.set(x, inc, z);
                mesh.rotation.set(Math.random() * 6, Math.random() * 6, Math.random() * 6);
                scene.add(mesh);

                const targetAngle = planet.angle;
                const tx = pOrbit * Math.cos(targetAngle),
                    tz = pOrbit * Math.sin(targetAngle);
                const dx = tx - x,
                    dz = tz - z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                const speed = 0.006 + Math.random() * 0.008;

                const rogue = {
                    mesh,
                    size,
                    pos: new THREE.Vector3(x, inc, z),
                    target: new THREE.Vector3(tx, 0, tz),
                    dir: new THREE.Vector3(dx / dist, -inc / dist * 0.1, dz / dist),
                    speed: speed,
                    planet: planetName,
                    planetRef: planet,
                    radius: spawnRadius,
                    angle: angle,
                    inclination: inc,
                    rotSpeed: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.03,
                        (Math.random() - 0.5) * 0.03,
                        (Math.random() - 0.5) * 0.03
                    ),
                    alive: true,
                    trail: [],
                    fireParticles: [],
                };
                rogueAsteroids.push(rogue);

                const trailCount = 60;
                const tPos = new Float32Array(trailCount * 3);
                const tCol = new Float32Array(trailCount * 3);
                const tSizes = new Float32Array(trailCount);
                for (let j = 0; j < trailCount; j++) {
                    tPos[j * 3] = mesh.position.x;
                    tPos[j * 3 + 1] = mesh.position.y;
                    tPos[j * 3 + 2] = mesh.position.z;
                    const bright = 0.3 + Math.random() * 0.7;
                    tCol[j * 3] = 1.0;
                    tCol[j * 3 + 1] = 0.3 + Math.random() * 0.4;
                    tCol[j * 3 + 2] = 0.0;
                    tSizes[j] = 0.04 + Math.random() * 0.08;
                }
                const tGeom = new THREE.BufferGeometry();
                tGeom.setAttribute('position', new THREE.BufferAttribute(tPos, 3));
                tGeom.setAttribute('color', new THREE.BufferAttribute(tCol, 3));
                tGeom.setAttribute('size', new THREE.BufferAttribute(tSizes, 1));
                const tMat = new THREE.PointsMaterial({
                    size: 0.08,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    sizeAttenuation: true,
                });
                const trailPoints = new THREE.Points(tGeom, tMat);
                scene.add(trailPoints);
                rogue.trailPoints = trailPoints;
                rogue.trailIndex = 0;
                rogue.trailCount = trailCount;
            }
        }

        buildAsteroidSystem();

        // ----- MOONS AND SATELLITES -----
        const moons = [];
        const satellites = [];

        // Function to create a moon texture (gray with craters)
        function createMoonTexture(baseColor = '#aaaaaa', craterCount = 80) {
            const W = 1024,
                H = 512;
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');

            // Base color with slight gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            const c = new THREE.Color(baseColor);
            const c1 = c.clone().multiplyScalar(0.85);
            const c2 = c.clone().multiplyScalar(1.15);
            grad.addColorStop(0, `rgb(${c1.r*255|0},${c1.g*255|0},${c1.b*255|0})`);
            grad.addColorStop(0.5, `rgb(${c.r*255|0},${c.g*255|0},${c.b*255|0})`);
            grad.addColorStop(1, `rgb(${c2.r*255|0},${c2.g*255|0},${c2.b*255|0})`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Add craters
            for (let i = 0; i < craterCount; i++) {
                const x = Math.random() * W;
                const y = Math.random() * H;
                const r = 3 + Math.random() * 30;
                const dark = new THREE.Color(baseColor).multiplyScalar(0.3 + Math.random() * 0.4);
                const light = new THREE.Color(baseColor).multiplyScalar(0.6 + Math.random() * 0.4);
                // Shadow
                ctx.beginPath();
                ctx.arc(x + r * 0.15, y + r * 0.15, r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,0,0,${0.15+Math.random()*0.25})`;
                ctx.fill();
                // Crater floor
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${dark.r*255|0},${dark.g*255|0},${dark.b*255|0},${0.5+Math.random()*0.4})`;
                ctx.fill();
                // Highlight rim
                ctx.beginPath();
                ctx.arc(x - r * 0.2, y - r * 0.2, r * 0.85, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${light.r*255|0},${light.g*255|0},${light.b*255|0},${0.08+Math.random()*0.15})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            // Add some noise
            const imageData = ctx.getImageData(0, 0, W, H);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const n = (Math.random() - 0.5) * 20;
                data[i] = Math.min(255, Math.max(0, data[i] + n));
                data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + n));
                data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + n));
            }
            ctx.putImageData(imageData, 0, 0);

            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            return tex;
        }

        // Function to create a moon
        function createMoon(name, parentPlanet, radius, orbitRadius, color, speedMultiplier = 1.0, tilt = 0) {
            const tex = createMoonTexture(color, 60 + Math.floor(Math.random() * 40));
            const mat = new THREE.MeshStandardMaterial({
                map: tex,
                roughness: 0.8,
                metalness: 0.1,
                emissive: new THREE.Color(0x222222),
                emissiveIntensity: 0.05,
            });
            const geom = new THREE.SphereGeometry(radius, 64, 64);
            const mesh = new THREE.Mesh(geom, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            if (tilt) mesh.rotation.x = tilt;

            // Position relative to parent planet (initial angle)
            const startAngle = Math.random() * Math.PI * 2;
            const pPos = parentPlanet.mesh.position;
            mesh.position.set(
                pPos.x + orbitRadius * Math.cos(startAngle),
                0,
                pPos.z + orbitRadius * Math.sin(startAngle)
            );
            scene.add(mesh);

            const data = {
                mesh,
                parentPlanet,
                orbitRadius,
                angle: startAngle,
                speed: 0.02 * speedMultiplier,
                name,
                radius,
            };
            moons.push(data);
            return data;
        }

        // Function to create a satellite (artificial)
        function createSatellite(parentPlanet, orbitRadius, inclination, speed, size = 0.08) {
            const group = new THREE.Group();

            // Main body
            const bodyGeo = new THREE.BoxGeometry(size * 0.8, size * 0.4, size * 0.4);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0xccccdd,
                roughness: 0.3,
                metalness: 0.8,
                emissive: new THREE.Color(0x224466),
                emissiveIntensity: 0.1,
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            // Solar panels (two wings)
            const panelMat = new THREE.MeshStandardMaterial({
                color: 0x446688,
                roughness: 0.2,
                metalness: 0.4,
                emissive: new THREE.Color(0x112233),
                emissiveIntensity: 0.05,
            });
            const panelGeo = new THREE.BoxGeometry(size * 0.3, size * 0.02, size * 0.8);
            const panel1 = new THREE.Mesh(panelGeo, panelMat);
            panel1.position.x = size * 0.6;
            panel1.castShadow = true;
            panel1.receiveShadow = true;
            group.add(panel1);
            const panel2 = new THREE.Mesh(panelGeo, panelMat);
            panel2.position.x = -size * 0.6;
            panel2.castShadow = true;
            panel2.receiveShadow = true;
            group.add(panel2);

            // Antenna (small sphere)
            const antMat = new THREE.MeshStandardMaterial({
                color: 0xffaa44,
                emissive: new THREE.Color(0xff6600),
                emissiveIntensity: 0.2,
                roughness: 0.2,
                metalness: 0.3,
            });
            const antGeo = new THREE.SphereGeometry(size * 0.15, 8, 8);
            const ant = new THREE.Mesh(antGeo, antMat);
            ant.position.set(0, size * 0.4, 0);
            group.add(ant);

            // Start position relative to parent
            const startAngle = Math.random() * Math.PI * 2;
            const pPos = parentPlanet.mesh.position;
            const x = pPos.x + orbitRadius * Math.cos(startAngle);
            const z = pPos.z + orbitRadius * Math.sin(startAngle);
            group.position.set(x, inclination, z);
            group.rotation.set(Math.random() * 0.5, Math.random() * 0.5, Math.random() * 0.5);

            scene.add(group);

            const data = {
                group,
                parentPlanet,
                orbitRadius,
                inclination,
                angle: startAngle,
                speed: speed,
                size,
            };
            satellites.push(data);
            return data;
        }

        // ----- ADD MOONS TO PLANETS -----

        // ----- ADD SATELLITES ORBITING EARTH -----

        // ----- COLLISION DETECTION (without visual effects) -----
        function checkCollisions() {
            for (const rogue of rogueAsteroids) {
                if (!rogue.alive) continue;
                const planet = rogue.planetRef;
                if (!planet || !planet.mesh) continue;

                const pPos = planet.mesh.position;
                const aPos = rogue.mesh.position;

                const dist = aPos.distanceTo(pPos);
                const hitDist = planet.radius + rogue.size * 0.6;

                if (dist < hitDist) {
                    rogue.alive = false;
                    scene.remove(rogue.mesh);
                    if (rogue.trailPoints) {
                        scene.remove(rogue.trailPoints);
                    }
                    for (const r2 of rogueAsteroids) {
                        if (r2 !== rogue && r2.planet === rogue.planet && r2.alive) {
                            r2.alive = false;
                            scene.remove(r2.mesh);
                            if (r2.trailPoints) scene.remove(r2.trailPoints);
                        }
                    }
                }
            }

            for (const asteroid of fireAsteroids) {
                if (!asteroid.alive) continue;
                const aPos = asteroid.mesh.position;
                for (const name in planets) {
                    if (name === 'earth') continue;
                    const planet = planets[name];
                    if (!planet || !planet.mesh) continue;
                    const pPos = planet.mesh.position;
                    const dist = aPos.distanceTo(pPos);
                    const hitDist = planet.radius + asteroid.size * 0.5;
                    if (dist < hitDist) {
                        scene.remove(asteroid.mesh);
                        asteroid.alive = false;
                        const idx = fireAsteroids.indexOf(asteroid);
                        if (idx > -1) fireAsteroids.splice(idx, 1);
                        break;
                    }
                }
            }

            for (let i = asteroids.length - 1; i >= 0; i--) {
                if (asteroids[i].alive === false) {
                    asteroids.splice(i, 1);
                }
            }
        }

        // ----- EARTH BUTTON -----
        let isAnimatingToEarth = false;
        let animStart = 0,
            animDuration = 1200;
        let animStartPos = new THREE.Vector3(),
            animEndPos = new THREE.Vector3();
        let animStartTarget = new THREE.Vector3(),
            animEndTarget = new THREE.Vector3();

        function flyToEarth() {
            if (!earthMesh) return;
            const pos = earthMesh.position.clone();
            const offset = new THREE.Vector3(2.8, 1.8, 5.5);
            const targetPos = pos.clone().add(offset);
            animStartPos.copy(camera.position);
            animEndPos.copy(targetPos);
            animStartTarget.copy(controls.target);
            animEndTarget.copy(pos);
            isAnimatingToEarth = true;
            animStart = performance.now();
        }

        document.getElementById('earth-btn').addEventListener('click', flyToEarth);
        window.addEventListener('keydown', (e) => { if (e.key === 'e' || e.key === 'E') flyToEarth(); });

        // ----- TIME DISPLAY -----
        function updateTime() {
            const now = new Date();
            document.getElementById('time-display').textContent = now.toUTCString().split(' ')[4] + ' UTC';
        }
        updateTime();
        setInterval(updateTime, 1000);

        // ----- LABEL -----
        const labelEl = document.getElementById('planet-label');

        function updateLabel(distToEarth) {
            if (distToEarth < 30) {
                labelEl.textContent = '✦ Earth';
                labelEl.style.opacity = '1';
                return;
            }
            let closest = null,
                closestDist = Infinity;
            for (const name in planets) {
                if (name === 'earth') continue;
                const p = planets[name];
                if (!p || !p.mesh) continue;
                const d = camera.position.distanceTo(p.mesh.position);
                if (d < closestDist) { closestDist = d;
                    closest = name; }
            }
            const sunDist = camera.position.length();
            if (sunDist < closestDist && sunDist < 35) {
                labelEl.textContent = '✦ Sun';
                labelEl.style.opacity = '0.8';
            } else if (closest && closestDist < 50) {
                const names = { mercury: '☿ Mercury', venus: '♀ Venus', mars: '♂ Mars', jupiter: '♃ Jupiter',
                    saturn: '♄ Saturn', uranus: '⛢ Uranus', neptune: '♆ Neptune' };
                labelEl.textContent = '✦ ' + (names[closest] || closest);
                labelEl.style.opacity = '0.7';
            } else {
                labelEl.textContent = '✦ Solar System';
                labelEl.style.opacity = '0.3';
            }
        }

        // ----- INIT EARTH -----
        let earthReady = false;

        async function initEarth() {
            try {
                await createEarth();
                earthReady = true;
                const now = new Date();
                const hours = now.getUTCHours() + now.getUTCMinutes() / 60;
                const angle = (hours / 24) * Math.PI * 2;
                const sunDir = new THREE.Vector3(
                    Math.cos(angle) * 0.8,
                    Math.sin(angle * 0.5) * 0.3 + 0.2,
                    Math.sin(angle) * 0.8
                ).normalize();
                if (earthUniforms) earthUniforms.sunDirection.value.copy(sunDir);
                if (earthMesh) {
                    const ep = earthMesh.position.clone();
                    controls.target.copy(ep);
                    camera.position.set(ep.x + 14, ep.y + 7, ep.z + 20);
                    controls.update();
                }
                animate();
            } catch (err) {
                console.warn('Earth init error:', err);
                earthReady = true;
                animate();
            }
        }

        // ----- ANIMATION LOOP -----
        let lastTime = 0;

        function animate(time = 0) {
            requestAnimationFrame(animate);

            const delta = Math.min(0.05, (time - lastTime) / 1000);
            lastTime = time;

            // Sun
            if (sunObj.uniforms) sunObj.uniforms.time.value += delta;

            // Update planets
            for (const name in planets) {
                const data = planets[name];
                if (!data || !data.mesh) continue;
                data.angle += data.speed * delta * 60;
                const x = data.orbitRadius * Math.cos(data.angle);
                const z = data.orbitRadius * Math.sin(data.angle);
                data.mesh.position.set(x, 0, z);
                data.mesh.rotation.y += delta * 0.25;

                if (name === 'earth') {
                    earthPosition.copy(data.mesh.position);
                    if (data.atmosphere) data.atmosphere.position.copy(data.mesh.position);
                    if (data.outerGlow) data.outerGlow.position.copy(data.mesh.position);
                    if (earthUniforms) {
                        const d = earthUniforms.sunDirection.value;
                        const sp = 0.00005;
                        const c = Math.cos(sp),
                            s = Math.sin(sp);
                        const x2 = d.x * c + d.z * s;
                        const z2 = -d.x * s + d.z * c;
                        d.x = x2;
                        d.z = z2;
                        d.y += Math.sin(time * 0.000005) * 0.00002;
                        d.normalize();
                    }
                }
                if (data.ringMesh) {
                    data.ringMesh.position.copy(data.mesh.position);
                    data.ringMesh.rotation.z += delta * 0.05;
                }
                if (data.dustParticles) {
                    data.dustParticles.position.copy(data.mesh.position);
                    data.dustParticles.rotation.z += delta * 0.03;
                }
            }

            // Update asteroids (normal)
            for (const asteroid of asteroids) {
                if (asteroid.alive === false) continue;
                asteroid.angle += asteroid.speed * delta * 60;
                const x = asteroid.radius * Math.cos(asteroid.angle);
                const z = asteroid.radius * Math.sin(asteroid.angle);
                asteroid.mesh.position.set(x, asteroid.inclination, z);
                asteroid.mesh.rotation.x += asteroid.rotSpeed.x * delta * 30;
                asteroid.mesh.rotation.y += asteroid.rotSpeed.y * delta * 30;
                asteroid.mesh.rotation.z += asteroid.rotSpeed.z * delta * 30;
            }

            // Update rogue asteroids
            for (const rogue of rogueAsteroids) {
                if (!rogue.alive) continue;
                const dir = rogue.dir.clone();
                const speed = rogue.speed * delta * 60;
                rogue.mesh.position.x += dir.x * speed;
                rogue.mesh.position.y += dir.y * speed;
                rogue.mesh.position.z += dir.z * speed;
                rogue.mesh.rotation.x += rogue.rotSpeed.x * delta * 30;
                rogue.mesh.rotation.y += rogue.rotSpeed.y * delta * 30;
                rogue.mesh.rotation.z += rogue.rotSpeed.z * delta * 30;

                if (rogue.trailPoints) {
                    const pos = rogue.trailPoints.geometry.attributes.position;
                    const array = pos.array;
                    for (let i = array.length - 3; i >= 3; i -= 3) {
                        array[i] = array[i - 3];
                        array[i + 1] = array[i - 2];
                        array[i + 2] = array[i - 1];
                    }
                    array[0] = rogue.mesh.position.x + (Math.random() - 0.5) * 0.2;
                    array[1] = rogue.mesh.position.y + (Math.random() - 0.5) * 0.2;
                    array[2] = rogue.mesh.position.z + (Math.random() - 0.5) * 0.2;
                    pos.needsUpdate = true;
                }

                const pulse = 0.7 + 0.3 * Math.sin(time * 0.005 + rogue.angle);
                rogue.mesh.material.emissiveIntensity = 0.6 + pulse * 0.5;
            }

            // ----- UPDATE MOONS -----
            for (const moon of moons) {
                const parent = moon.parentPlanet;
                if (!parent || !parent.mesh) continue;
                const pPos = parent.mesh.position;
                moon.angle += moon.speed * delta * 60;
                const x = pPos.x + moon.orbitRadius * Math.cos(moon.angle);
                const z = pPos.z + moon.orbitRadius * Math.sin(moon.angle);
                moon.mesh.position.set(x, 0, z);
                moon.mesh.rotation.y += delta * 0.1;
            }

            // ----- UPDATE SATELLITES -----
            for (const sat of satellites) {
                const parent = sat.parentPlanet;
                if (!parent || !parent.mesh) continue;
                const pPos = parent.mesh.position;
                sat.angle += sat.speed * delta * 60;
                const x = pPos.x + sat.orbitRadius * Math.cos(sat.angle);
                const z = pPos.z + sat.orbitRadius * Math.sin(sat.angle);
                sat.group.position.set(x, sat.inclination, z);
                sat.group.rotation.x += delta * 0.2;
                sat.group.rotation.z += delta * 0.1;
            }

            // Collision detection (removes asteroids on hit, no effects)
            checkCollisions();

            // Camera target
            if (!isAnimatingToEarth && earthMesh) {
                const dist = camera.position.distanceTo(earthPosition);
                const blend = Math.min(1, Math.max(0, (dist - 20) / 45));
                const target = new THREE.Vector3().lerpVectors(
                    earthPosition,
                    new THREE.Vector3(0, 0, 0),
                    blend
                );
                controls.target.lerp(target, 0.04);
                updateLabel(dist);
            }

            if (isAnimatingToEarth) {
                const elapsed = performance.now() - animStart;
                const t = Math.min(1, elapsed / animDuration);
                const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                camera.position.lerpVectors(animStartPos, animEndPos, ease);
                controls.target.lerpVectors(animStartTarget, animEndTarget, ease);
                if (t >= 1) {
                    isAnimatingToEarth = false;
                    controls.target.copy(animEndTarget);
                }
                const dist = camera.position.distanceTo(earthPosition);
                updateLabel(dist);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // ----- RESIZE -----
        window.addEventListener('resize', () => {
            const w = window.innerWidth,
                h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ----- START -----
        initEarth().catch(err => {
            console.error('Init error:', err);
            document.body.innerHTML = `
                    <div style="color:white;font-family:sans-serif;padding:40px;text-align:center;">
                        <h2>🌍 Loading Error</h2>
                        <p style="color:#aaa;">Please check your connection and reload.</p>
                        <p style="color:#666;font-size:14px;margin-top:20px;">${err.message}</p>
                    </div>
                `;
        });

        console.log('🌕 Solar System with HD Moons and Satellites – Earth\'s Moon included!');
        console.log('🌍 Click "Earth" or press E to zoom to Earth.');
    </script>
</body>
</html>
